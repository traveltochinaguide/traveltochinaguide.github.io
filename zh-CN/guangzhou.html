 window.translations = {"zh-CN":{"metaTitle":"探索中国 — 文化与风景","metaDescription":"浏览北京、上海等城市指南，桂林风光，长城一日游，美食与实用旅行贴士。","metaKeywords":"中国旅游, 中国旅行, 北京旅游, 上海指南, 长城, 故宫, 兵马俑, 桂林, 中国美食, 中国旅行规划","siteTitle":"探索中国","navHome":"首页","navCulture":"文化","cultureIching":"易经","navCities":"热门城市","navFood":"美食","navNature":"自然风光","carouselTitle1":"万里长城","carouselSubtitle1":"宏伟的古代世界奇迹。","carouselTitle2":"上海","carouselSubtitle2":"现代中国充满活力的脉搏。","carouselTitle3":"桂林","carouselSubtitle3":"喀斯特山脉与宁静河流的交汇。","citiesTitle":"标志性城市","citiesDescription":"从帝王之都到未来主义大都市，发现中国充满活力的心脏。","cityBeijing":"北京","descBeijing":"帝王之都，紫禁城和长城的所在地。","cityShanghai":"上海","descShanghai":"一个耀眼的大都市，展示了中国的未来雄心和殖民历史。","cityXian":"西安","descXian":"丝绸之路的古老起点，兵马俑的故乡。","cityGuilin":"桂林","descGuilin":"以漓江沿岸令人惊叹的喀斯特地貌而闻名。","longDescBeijing":"<p>Beijing, the capital of the People's Republic of China, is a city of immense history and cultural significance. It has been the center of power for much of the country's history, which is evident in its grand architecture.</p><p>Explore the vast complex of the Forbidden City, the former imperial palace, walk along the historic <strong>Great Wall</strong> (see the <a href=\"#great-wall-tour\">Great Wall Tour section</a> below), and visit the serene Temple of Heaven. Modern Beijing is also a hub of art, cuisine, and commerce, offering a dynamic blend of old and new.</p><h3 id=\"great-wall-tour\" class=\"text-xl font-semibold mt-6 mb-2\">Beijing Great Wall Tour – Mutianyu & Badaling</h3><p>The <strong>Beijing Great Wall tour</strong> is the most popular day trip from the city. Typical options include private transfers, shared shuttle buses, and guided excursions to <strong>Mutianyu</strong> (gentler slopes and restored sections) or <strong>Badaling</strong> (easier access and visitor facilities). Tours range from half-day to full-day and often include cable car or toboggan options.</p><p><strong>Duration:</strong> 4–6 hours depending on destination and transport. <strong>How to book:</strong> Book via local tour operators, reputable booking platforms, or your hotel concierge. For a quieter experience choose Mutianyu on weekdays; for the classic experience choose Badaling early in the morning.</p><figure class=\"mt-4\"> <img src=\"/images/attr-great-wall-detail.jpg\" alt=\"Beijing Great Wall tour – Mutianyu section\" width=\"1200\" height=\"675\" class=\"w-full h-auto rounded\" loading=\"lazy\"> <figcaption class=\"text-sm text-gray-500 mt-2\">Beijing Great Wall tour: Mutianyu section – recommended for families and photographers.</figcaption></figure><h3 id=\"798-art-zone\" class=\"text-xl font-semibold mt-6 mb-2\">798 Art Zone (Dashanzi)</h3><p>The <strong>798 Art Zone</strong>, or Dashanzi Art District, is a vibrant hub of contemporary Chinese art. Housed in decommissioned military factories built with a unique Bauhaus-influenced style, it's a maze of galleries, studios, boutiques, and cafés. It's a must-visit for modern art lovers, offering a look into Beijing's creative scene. Allow 3-4 hours to explore.</p><figure class=\"mt-4\"> <img src=\"/images/attr-798-art.jpg\" alt=\"798 Art Zone gallery\" width=\"1200\" height=\"675\" class=\"w-full h-auto rounded\" loading=\"lazy\"> <figcaption class=\"text-sm text-gray-500 mt-2\">A gallery in Beijing's 798 Art Zone.</figcaption></figure><h3 class=\"text-xl font-semibold mt-6 mb-2\">How to get there</h3><p><strong>By air:</strong> Beijing Capital (PEK) and Beijing Daxing (PKX) serve international flights. From airports use airport express train, taxis or Didi (ride-hailing).</p><p><strong>By train:</strong> Beijing has multiple stations (Beijing South, Beijing West, Beijing Railway Station) connecting high-speed services from throughout China.</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">Best time to visit</h3><p>Spring (Apr–May) and Autumn (Sep–Oct) offer comfortable weather and clearer skies. Winters can be very cold; summers are hot and humid.</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">Getting around</h3><ul><li><strong>Subway:</strong> Extensive, inexpensive and efficient. Get a transit card (Yikatong) or use mobile payments.</li><li><strong>Taxi / Didi:</strong> Widely available. Have your destination written in Chinese for drivers.</li><li><strong>Walking / cycling:</strong> Hutongs and some park areas are best explored on foot.</li></ul><h3 class=\"text-xl font-semibold mt-6 mb-2\">Suggested itineraries</h3><p><strong>1 day:</strong> Forbidden City – Tiananmen Square – Temple of Heaven – Hutong walk in the evening.</p><p><strong>3 days:</strong> Day 1: Forbidden City + Tiananmen + Wangfujing; Day 2: Great Wall (Mutianyu) day trip; Day 3: Summer Palace + Temple of Heaven + Hutongs.</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">Practical tips</h3><ul><li>Cash & mobile pay: Alipay/WeChat Pay are widely used; many places accept cards in big hotels and attractions.</li><li>Visa: Check embassy rules before travel.</li><li>Air quality: Check AQI and plan outdoor activities when air is clearer.</li><li>Emergency: Dial <strong>110</strong> for police, <strong>120</strong> for ambulance, <strong>119</strong> for fire in China.</li><li>Language: English signage is common at major attractions but learn a few Chinese phrases or use translation apps.</li></ul>","cityJiuzhaigou":"九寨沟","descJiuzhaigou":"彩色湖泊、层叠瀑布与雪峰的奇境。","cityYangtze":"长江","descYangtze":"穿越壮丽三峡，畅游中华文明的命脉。","cityIching":"易经","longDescShanghai":"<p>上海是全球金融中心，也是一座充满卓越特质的城市。以上海中心大厦和东方明珠塔为主的未来主义天际线令人叹为观止。</p><p>沿着外滩漫步，欣赏殖民时期的建筑；探索法租界的时尚精品店和艺术画廊；或在古典的豫园中寻找宁静。上海是中国快速发展的见证，是每位游客的必访之地。</p>","longDescXian":"<p>西安是中国最古老的城市之一，也是丝绸之路的东端起点。最著名的景点是兵马俑，这是一个巨大的陶俑群，描绘了秦始皇——中国第一位皇帝的军队。</p><p>古城墙保存完好，您可以在城墙上骑自行车，欣赏壮观的景色。别错过回民街，那里是充满活力的美食体验。</p>","longDescGuilin":"<p>桂林的风景是中国古典山水画的灵感来源。位于华南，以沿漓江的奇特喀斯特地貌闻名于世。</p><p>体验其之美的最佳方式是沿漓江乘船游览，您将看到石灰岩山峰、竹林和宁静的村庄。您还可以探索芦笛岩，这是一个天然石灰岩洞穴，有色彩灯光照亮的壮观钟乳石和石笋。</p>""longDescZhangjiajie":"<p>张家界以联合国教科文组织世界遗产名录中的石英砂岩柱群闻名，是徒步和摄影的理想之地。这里的石柱群被认为是电影《阿凡达》中「悬浮山」景观的灵感来源。</p><h3>亮点</h3><ul><li><strong>张家界国家森林公园</strong> — 著名的石英砂岩柱群所在地。</li><li><strong>天波府</strong> — 《阿凡达》取景地观景台，景色壮观。</li><li><strong>张家界大峡谷玻璃桥</strong> — 刺激的悬空玻璃步道，俯瞰深谷。</li></ul>","longDescJiuzhaigou":"<p>九寨沟以其鲜艳的彩色湖泊、多层瀑布和原始的高山峡谷而闻名，是四川省的风景明珠。</p><h3>亮点</h3><ul><li><strong>日则沟</strong> — 色彩斑斓的湖泊和清澈的水面倒影。</li><li><strong>树正沟</strong> — 层叠瀑布，经典景致。</li><li><strong>徒步与摄影</strong> — 木栈道方便到达各观景点。</li></ul>","longDescYangtze":"<p>长江是中国最长的河流，以壮观的三峡和受欢迎的游轮航线而闻名，结合了自然风光与人文体验。</p><h3>亮点</h3><ul><li><strong>三峡</strong> — 河流切割出的陡峭峡谷，景色壮丽。</li><li><strong>长江游轮</strong> — 重庆至宜昌多日航线，沿途风景如画。</li><li><strong>人文站点</strong> — 沿岸古镇、寺庙和当地集市。</li></ul>",
};;
