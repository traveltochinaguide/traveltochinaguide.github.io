      <div class="p-8">
        <div id="city-content" class="prose text-gray-700"><p>苏州位于江苏省，拥有联合国教科文组织世界遗产地位，以古典园林、丝绸生产和水乡运河网络闻名。苏州被誉为<strong>东方威尼斯</strong>，与中国现代大都市形成宁静的对比。</p><p>游览拙政园、沿平江路历史运河漫步、参观苏州丝绸博物馆。苏州的古典园林——包括拙政园和留园——是中国最著名的园林。</p><p>别错过虎丘塔、古老的留园以及热闹的平江路历史街区。</p></div>

"<p>北京，中华人民共和国的首都，是一座融合古老与现代的历史名城。这里曾是多个朝代的政治中心，拥有丰富的文化遗产。</p><p>在这里，您可以探索故宫的宏伟建筑，漫步于<a href=\"#great-wall-tour\">长城之巅</a>，感受中华文明的磅礴气势；参观天坛，体验古代皇家的祭祀文化；或在胡同中穿行，探寻老北京的市井风情。北京还是现代艺术和创意产业的聚集地，<a href=\"#798-art-zone\">798艺术区</a>是游客不可错过的打卡胜地。</p><h3 id=\"great-wall-tour\" class=\"text-xl font-semibold mt-6 mb-2\">北京长城一日游 – 慕田峪与八达岭</h3><p><strong>北京长城游</strong>是最受欢迎的一日游项目之一。游客可以选择私人包车、班车或跟团游览<a href=\"#great-wall-tour\">慕田峪</a>（坡度较缓，适合家庭）或<a href=\"#great-wall-tour\">八达岭</a>（交通便利，设施齐全）。部分团队包含缆车或滑道项目。</p><p><strong>时长：</strong>4–6小时（根据目的地和交通方式）。<strong>预订方式：</strong>通过旅行社、正规预订平台或酒店前台预订。周中前往慕田峪游客较少，选择早间前往八达岭可避开拥挤。</p><figure class=\"mt-4\"> <img src=\"/images/attr-great-wall-detail.jpg\" alt=\"北京长城游 – 慕田峪段\" width=\"1200\" height=\"675\" class=\"w-full h-auto rounded\" loading=\"lazy\"> <figcaption class=\"text-sm text-gray-500 mt-2\">北京长城游：慕田峪段 – 适合家庭和摄影爱好者。</figcaption></figure><h3 id=\"798-art-zone\" class=\"text-xl font-semibold mt-6 mb-2\">798艺术区（大山子艺术区）</h3><p><strong>798艺术区</strong>（又称大山子艺术区）是北京当代艺术的地标性区域，由废弃的工业厂房改造而成，保留了包豪斯建筑风格。这里云集了画廊、艺术工作室、创意小店和咖啡馆，是感受北京前卫艺术氛围的必游之地。建议安排3–4小时游览。</p><figure class=\"mt-4\"> <img src=\"/images/attr-798-art.jpg\" alt=\"798艺术区画廊\" width=\"1200\" height=\"675\" class=\"w-full h-auto rounded\" loading=\"lazy\"> <figcaption class=\"text-sm text-gray-500 mt-2\">798艺术区的画廊一角。</figcaption></figure><h3 class=\"text-xl font-semibold mt-6 mb-2\">如何到达北京</h3><p><strong>航空：</strong>北京有两座国际机场：首都国际机场（PEK）和大兴国际机场（PKX）。从机场可乘坐机场快轨、出租车或网约车（滴滴）前往市区。</p><p><strong>火车：</strong>北京拥有多个火车站，如北京南站（高铁枢纽）、北京西站和北京站，连接全国各地。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">最佳游览时间</h3><p>春季（4–5月）和秋季（9–10月）气候宜人，天气清朗，是最佳旅行季节。冬季寒冷，夏季炎热潮湿。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">市内交通</h3><ul><li><strong>地铁：</strong>线路四通八达，价格低廉，建议办理交通卡（一卡通）或使用手机支付。</li><li><strong>出租车/网约车：</strong>随处可见，但建议提前准备好目的地的中文名称。</li><li><strong>步行/骑行：</strong>胡同和部分公园区域适合步行或骑行游览。</li></ul><h3 class=\"text-xl font-semibold mt-6 mb-2\">推荐游览行程</h3><p><strong>1日游：</strong>故宫 → 天安门广场 → 天坛 → 晚间胡同漫步。</p><p><strong>3日游：</strong>Day 1：故宫 + 天安门 + 王府井；Day 2：慕田峪长城一日游；Day 3：颐和园 + 天坛 + 什刹海胡同。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">实用贴士</h3><ul><li><strong>支付：</strong>移动支付（支付宝/微信支付）广泛使用，酒店和景点通常接受银联卡。</li><li><strong>签证：</strong>出发前确认签证政策，部分国家公民可享受短期免签。</li><li><strong>空气质量：</strong>关注空气质量指数（AQI），在天气晴朗时安排户外活动。</li><li><strong>紧急电话：</strong>中国公安110、急救120、火警119。</li><li><strong>语言：</strong>重点景区有英文标识，但学习简单中文或使用翻译软件会大大方便交流。</li></ul>","longDescShanghai":"<p>上海是全球金融中心，也是一座充满卓越特质的城市。以上海中心大厦和东方明珠塔为主的未来主义天际线令人叹为观止。</p><p>沿着外滩漫步，欣赏殖民时期的建筑；探索法租界的时尚精品店和艺术画廊；或在古典的豫园中寻找宁静。上海是中国快速发展的见证，是每位游客的必访之地。</p>","longDescXian":"<p>西安是中国最古老的城市之一，也是丝绸之路的东端起点。最著名的景点是兵马俑，这是一个巨大的陶俑群，描绘了秦始皇——中国第一位皇帝的军队。</p><p>古城墙保存完好，您可以在城墙上骑自行车，欣赏壮观的景色。别错过回民街，那里是充满活力的美食体验。</p>","longDescGuilin":"<p>桂林的风景是中国古典山水画的灵感来源。位于华南，以沿漓江的奇特喀斯特地貌闻名于世。</p><p>体验其之美的最佳方式是沿漓江乘船游览，您将看到石灰岩山峰、竹林和宁静的村庄。您还可以探索芦笛岩，这是一个天然石灰岩洞穴，有色彩灯光照亮的壮观钟乳石和石笋。</p>","longDescZhangjiajie":"<p>张家界以矗立在联合国教科文组织国家公园内的奇特柱状砂岩地貌闻名——这是一种超凡的景观，非常适合徒步和摄影。</p><h3>亮点</h3><ul><li><strong>张家界国家森林公园</strong> – 著名的石英砂岩柱所在地。</li><li><strong>阿凡达哈路路亚山</strong> – 启发电影景观的风景观点。</li><li><strong>玻璃桥（张家界大峡谷）</strong> – 拥有壮观景色的刺激悬空人行道。</li></ul>","cityChengdu":"成都","descChengdu":"大熊猫的故乡，天府之国的门户。","longDescChengdu":"<p>成都，四川省省会，是一座将古老传统与现代生活完美融合的城市。成都以大熊猫繁育研究基地闻名于世，游客可以在这里观察到这些可爱的国宝在近自然环境中生活栖息。</p><p>成都还是通往中国最壮观自然景观的门户——乐山大佛和风景秀丽的九寨沟就在附近。在市区内，您可以游览历史悠久的锦里古街，在人民公园放松身心，体验悠闲的四川生活方式。成都也被联合国教科文组织评为世界美食之都——麻辣鲜香的川菜享誉全球。</p><h3 id=\"panda-base\" class=\"text-xl font-semibold mt-6 mb-2\">成都大熊猫繁育研究基地</h3><p><strong>成都大熊猫繁育研究基地</strong>是成都最受欢迎的景点。基地位于成都市区以北约10公里处，饲养着超过50只大熊猫，是世界上最成功的大熊猫繁殖研究项目之一。</p><p><strong>开放时间：</strong>07:30-18:00。<strong>门票：</strong>约55元。<strong>地铁：</strong>3号线大熊猫基地站。</p><h3 id=\"jinli-street\" class=\"text-xl font-semibold mt-6 mb-2\">锦里古街</h3><p><strong>锦里</strong>是一条以传统建筑、地方小吃、茶馆和手工艺品闻名的著名步行街。作为中国最古老的商业街之一，锦里每到傍晚便红灯笼高挂，街头表演热闹非凡。</p><h3 id=\"dujiangyan\" class=\"text-xl font-semibold mt-6 mb-2\">都江堰水利工程</h3><p>距成都约50公里的<strong>都江堰</strong>是世界文化遗产——这是一项至今仍在使用的古代水利工程，集防洪、灌溉、航运于一体，是中国古代水利技术的杰出成就，也是徒步观光的好去处。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">如何到达</h3><p><strong>航空：</strong>成都天府国际机场（TFU）有国内外航班。地铁、大巴或出租车可达市中心（约45分钟）。</p><p><strong>火车：</strong>高铁直达北京（约7小时）、上海（约10小时）、西安（约3小时）。成都东站离景区最近。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">最佳旅游时间</h3><p>春季（3-5月）和秋季（9-11月）天气宜人。夏季炎热，冬季温和但偶尔有雾。上午是大熊猫最活跃的进食时间。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">市内交通</h3><ul><li><strong>地铁：</strong>12条以上线路。使用\"天府通\"APP或交通卡。</li><li><strong>滴滴出行：</strong>在成都非常便捷。</li><li><strong>共享单车：</strong>哈啰、美团等在全市广泛使用。</li></ul><h3 class=\"text-xl font-semibold mt-6 mb-2\">推荐行程</h3><p><strong>1日游：</strong>上午游览大熊猫基地——下午逛锦里古街——晚上观看川剧变脸。</p><p><strong>3日游：</strong>D1：大熊猫基地+锦里；D2：都江堰一日游；D3：人民公园+宽窄巷子+川菜美食。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">实用贴士</h3><ul><li><strong>川菜美食：</strong>推荐尝试麻婆豆腐、宫保鸡丁、担担面和成都火锅。</li><li><strong>语言：</strong>普通话通用；在当地餐馆使用翻译APP很有帮助。</li><li><strong>支付：</strong>支付宝/微信支付为主；锦里小摊建议备少量现金。</li></ul>","ogTitleChengdu":"成都旅游指南 - 大熊猫、川菜与文化遗产","ogDescChengdu":"探索成都，大熊猫基地、锦里、都江堰和最佳川菜指南。","metaDescChengdu":"成都旅游完整指南：大熊猫、锦里、都江堰、川菜。","altChengdu":"成都大熊猫基地 - 熊猫在自然栖息地吃竹子","cityHangzhou":"杭州","descHangzhou":"西湖畔的诗意天堂，以茶和丝绸闻名。","longDescHangzhou":"<p>杭州，浙江省省会，被广泛认为是中国最美丽的城市之一。传奇的<strong>西湖</strong>千年来激发了无数诗人、画家和学者的灵感。这座城市将自然美景、历史底蕴和蓬勃发展的现代经济（阿里巴巴总部所在地）完美融合。</p><p>西湖的宁静湖水被群山、宝塔和园林环绕，提供全年无休的船游、骑行绿道和风景漫步。西湖景区是联合国教科文组织世界遗产，也是中国最受游客欢迎的旅游目的地之一。</p><h3 id=\"west-lake\" class=\"text-xl font-semibold mt-6 mb-2\">西湖</h3><p><strong>西湖</strong>是杭州的明珠。这个被花园、寺庙和人造岛屿环绕的淡水湖泊，几个世纪以来一直是艺术灵感的源泉。<strong>乘船游览</strong>（尤其是封闭式\"贡多拉\"摇橹船）、沿<strong>苏堤</strong>漫步、登<strong>雷峰塔</strong>欣赏夕阳是典型的杭州体验。</p><p><strong>开放：</strong>24小时。<strong>最佳时间：</strong>清晨薄雾湖景，傍晚雷峰塔夕阳。</p><h3 id=\"longjing-tea\" class=\"text-xl font-semibold mt-6 mb-2\">龙井茶园</h3><p>杭州是<strong>龙井（虎跑）茶</strong>的故乡，是中国最著名的绿茶之一。<strong>梅家坞</strong>周边的茶园提供参观、采茶体验和传统茶室品茶服务，置身于青山绿丘之间。</p><h3 id=\"grand-canal\" class=\"text-xl font-semibold mt-6 mb-2\">京杭大运河</h3><p>杭州是<strong>京杭大运河</strong>南端起点——这是世界上最长的人工运河。运河沿线历史街区经过精心修复，设有步行街、咖啡馆和游船观光。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">如何到达</h3><p><strong>航空：</strong>杭州萧山国际机场（HGH）有国内及区域性国际航班。机场1号线连接市中心（约45分钟）。</p><p><strong>火车：</strong>杭州东站是主要高铁枢纽。高铁直达上海（约45分钟）、北京（约4.5小时）、西安（约5小时）。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">最佳旅游时间</h3><p>春季（3-5月）和秋季（9-11月）是理想季节。夏季炎热且人流密集，冬季安静但偶有雾霾。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">市内交通</h3><ul><li><strong>地铁：</strong>网络发达。使用杭州地铁APP或交通卡。</li><li><strong>自行车：</strong>环西湖骑行是强烈推荐的体验。</li><li><strong>滴滴/出租车：</strong>全市随处可见。</li></ul><h3 class=\"text-xl font-semibold mt-6 mb-2\">推荐行程</h3><p><strong>1日游：</strong>上午游西湖（苏堤漫步、船游）——午餐湖滨餐厅——下午龙井茶园——晚上运河散步。</p><p><strong>3日游：</strong>D1：西湖+雷峰塔；D2：龙井茶村+梅家坞；D3：河坊街+运河+丝绸购物。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">实用贴士</h3><ul><li><strong>茶叶：</strong>直接从茶农家购买价格更优，品质更有保障。</li><li><strong>周末：</strong>西湖周末人流极大——建议平日出行。</li><li><strong>丝绸：</strong>杭州是中国丝绸之都。中国丝绸博物馆提供参观和购物。</li></ul>","ogTitleHangzhou":"杭州旅游指南 - 西湖、茶文化与古老遗产","ogDescHangzhou":"探索杭州，西湖、龙井茶园和大运河指南。","metaDescHangzhou":"杭州旅游完整指南：西湖、龙井茶、大运河和古老中国文化。","altHangzhou":"杭州西湖 - 日落时分宝塔和柳树的宁静湖泊","cityXiamen":"厦门","descXiamen":"拥有殖民遗产和鼓浪屿的迷人海滨城市。","longDescXiamen":"<p>厦门，福建省沿海城市，是中国最宜居的城市之一。这里融合了殖民时期建筑、活力四射的美食文化、便捷的海滩接入，以及对岸风景如画的<strong>鼓浪屿</strong>——一座禁止汽车通行的岛屿。</p><p>这座城市气候宜人、节奏悠闲，林荫大道、海滨长廊与闽南、台湾和国际影响交织，营造出独特的氛围。</p><h3 id=\"gulangyu\" class=\"text-xl font-semibold mt-6 mb-2\">鼓浪屿</h3><p><strong>鼓浪屿</strong>（意为\"波涛之岛\"）是联合国教科文组织世界遗产，隔厦门港与厦门相望。岛屿以殖民建筑、无汽车通行的街道、钢琴博物馆和海滨风情著称。从东渡码头乘渡轮（10分钟，票价约35元）；每日游客量有上限，建议提前购票。</p><p><strong>亮点：</strong>钢琴博物馆、菽庄花园、日光岩（登顶可360度俯瞰全岛）。</p><h3 id=\"nanputuo\" class=\"text-xl font-semibold mt-6 mb-2\">南普陀寺</h3><p><strong>南普陀寺</strong>是厦门最重要的佛教寺庙之一，位于五老峰山脚，毗邻厦门大学。以素菜餐厅和可俯瞰校区的徒步山路闻名。</p><h3 id=\"zengcuoan\" class=\"text-xl font-semibold mt-6 mb-2\">曾厝垵</h3><p><strong>曾厝垵</strong>是一个热闹的步行街区，拥有精品民宿、咖啡馆、地方小吃和手工艺品店。这里原为渔村，现在是厦门最色彩斑斓的社区——非常适合傍晚漫步和品尝闽南小吃。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">如何到达</h3><p><strong>航空：</strong>厦门高崎国际机场（XMN）有广泛的国内航线及东南亚、日本、韩国的国际航班。地铁和巴士连接市中心（约30分钟）。</p><p><strong>火车：</strong>厦门站和厦门北站提供高铁服务。直达上海（约4小时）、福州（约1.5小时）、深圳（约3小时）。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">最佳旅游时间</h3><p>秋季和冬季（10月至次年3月）天气最佳——温暖干燥。春季（4-5月）也宜人。避开台风季节（7-9月）。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">市内交通</h3><ul><li><strong>地铁/BRT：</strong>快速公交和地铁线连接大多数旅游区。</li><li><strong>滴滴/出租车：</strong>短途出行非常便捷。</li><li><strong>赴鼓浪屿渡轮：</strong>通过\"屿见\"APP或东渡码头购票。往返约35元；渡轮运营时间07:10-21:00。</li></ul><h3 class=\"text-xl font-semibold mt-6 mb-2\">推荐行程</h3><p><strong>1日游：</strong>上午南普陀寺——厦门大学+校园漫步——傍晚曾厝垵。</p><p><strong>3日游：</strong>D1：鼓浪屿（整天）；D2：南普陀寺+胡里山炮台+曾厝垵；D3：海滩+厦门美食之旅。</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">实用贴士</h3><ul><li><strong>鼓浪屿船票：</strong>提前通过APP购票，尤其周末。</li><li><strong>美食：</strong>推荐尝试厦门特色：海蛎煎、麻糍、鱼丸汤。</li><li><strong>语言：</strong>厦门方言（闽南语）与普通话不同，但当地人普遍说普通话。</li></ul>","ogTitleXiamen":"厦门旅游指南 - 鼓浪屿、海滨风光与文化遗产","ogDescXiamen":"探索厦门，鼓浪屿、南普陀寺和活力美食指南。","metaDescXiamen":"厦门旅游完整指南：鼓浪屿、南普陀寺、海滨魅力。","altXiamen":"厦门海滨城市 - 黄昏时分海边的殖民建筑","longDescJiuzhaigou":"<p>九寨沟以其鲜艳的翠绿湖泊、多层瀑布和原始的高山山谷而闻名——四川省的风景明珠。</p><h3>亮点</h3><ul><li><strong>日则沟</strong> – 彩色湖泊和清澈的水色倒影。</li><li><strong>树正沟</strong> – 层叠瀑布的经典景观。</li><li><strong>徒步与摄影</strong> – 木板路小径方便进入各个观景点。</li></ul>","longDescYangtze":"<p>长江是中国最长的河流，以壮观的三峡和受欢迎的河轮闻名，结合风景和文化游览。</p><h3>亮点</h3><ul><li><strong>三峡</strong> – 河流切割的陡峭峡谷，提供壮观的景色。</li><li><strong>长江游轮</strong> – 重庆与宜昌之间的多日游轮选择。</li><li><strong>文化站点</strong> – 河畔小镇、寺庙和当地市场。</li></ul>","longDescIching":"<p><strong>易经</strong>（亦作 iching，中文：<strong>易经</strong>）——字面意思为<em>变化之书</em>——是中国最古老的经典之一。它结合了宇宙学、哲学和一套用于占卜和决策的64卦系统。</p><h3>历史与结构</h3><p>易经经历了数千年的发展。64卦中的每一卦都由六条线（断线或连画）组成。传统注疏《十翼》将文本扩展为一部丰富的哲学著作，供学者和圣人使用。</p><h3>易经占卜如何运作</h3><p>现代易经方法使用硬币或蓍草技术来生成卦象。解读易经卦象涉及阅读其含义、卦变，以及它与您的问题的关系。</p><h3>为何今日阅读易经？</h3><ul><li><strong>哲学洞察：</strong>易经提供变化和决策的框架。</li><li><strong>文化背景：</strong>理解易经加深对中国思想、历史和文学的欣赏。</li><li><strong>实际用途：</strong>冥想、创意提示和反思性决策过程。</li></ul><h3>进一步阅读与资源</h3><p>推荐的译本和注疏包括 Richard Wilhelm（由 Cary F. Baynes 翻译）的著作，以及用现代术语解释易经卦象的现代注疏。</p>","natureTitle":"震撼人心的自然风光","natureDescription":"发现数百年来为诗人和艺术家提供灵感的多元景观。","natureZhangjiajie":"张家界","natureJiuzhaigou":"九寨沟","natureYangtze":"长江","cuisineTitle":"一场美食之旅","cuisineDescription":"品尝丰富多彩的中国美食，满足各种口味。","popularDishesTitle":"热门菜品","foodDuck":"北京烤鸭","foodDimSum":"点心","foodHotpot":"火锅","foodDumplings":"饺子","tipsTitle":"实用旅行贴士","tipVisaTitle":"签证与入境","tipVisaDesc":"中国已对包括欧洲和亚洲在内的许多国家实施短期旅游免签政策。然而，政策更新频繁。我们强烈建议您在出行前查看当地中国大使馆或领事馆的最新官方公告，以确认您是否符合免签资格。","tipPaymentTitle":"支付方式","tipPaymentDesc":"支付宝和微信支付等移动支付占主导地位。推荐安装使用。酒店和大型商店接受主要信用卡。","footerText":"© 2026 探索中国. 保留所有权利。","footerDisclaimer":"本为展示网站。所有图片均来自 Unsplash，仅供说明目的。","contactTitle":"联系我们","contactDescription":"有疑问？我们很乐意收到您的来信。请发送消息，我们会尽快回复。","contactNameLabel":"姓名","contactEmailLabel":"邮箱","contactMessageLabel":"留言","contactButton":"发送消息","foodPageTitle":"地道中华美食","foodPageSubtitle":"一场穿越中国美食风味的味蕾之旅","foodIntroTitle":"中国烹饪的艺术","foodIntroDesc":"中国菜是世界上最古老、最多样的菜系之一。","regionSichuan":"川菜","descSichuan":"以大胆的口味、大蒜和辣椒的辛辣著称。","regionCantonese":"粤菜","descCantonese":"以新鲜食材和少量香料著称。点心是亮点。","regionJiangsu":"苏菜","descJiangsu":"以柔软的质地和严格的时令食材选择著称。","regionShandong":"鲁菜","descShandong":"以丰富的海鲜和汤品著称。","dishKungPao":"宫保鸡丁","descKungPao":"香辣炒鸡配花生和蔬菜。","dishMapoTofu":"麻婆豆腐","descMapoTofu":"豆腐配香辣油酱和肉末。","dishSpringRolls":"春卷","descSpringRolls":"金黄酥脆的蔬菜或肉馅卷。","dishChowMein":"炒面","descChowMein":"配蔬菜和酱油的炒面。","dishWontons":"馄饨","descWontons":"鲜嫩的水饺，配以清澈鲜美的汤底。","titlePekingDuck":"北京烤鸭","subtitlePekingDuck":"北京传奇烤鸭","contentPekingDuck":"<p>北京烤鸭是来自北京的菜肴，可追溯至皇室时代。肉的特点是薄而脆的皮，正宗的版本在食客面前由厨师切片，通常主要提供皮和少量肉。</p><p>鸭子是专门为这道菜饲养的，在65天后宰杀并调味，然后在封闭或悬挂炉中烤制。肉通常与大葱、黄瓜和甜面酱一起食用，用薄饼卷着馅料一起吃。</p>","recipeIngredientPekingDuck":"1 whole duck (specially bred for Peking Duck), 2 stalks scallion, 1 cucumber, 3 tbsp sweet bean sauce, 8 thin pancakes","recipeInstructionsPekingDuck":["Prepare the duck: breed for 65 days, slaughter and season before roasting.","Roast the duck in a closed or hung oven until the skin is thin and crisp.","Slice the duck tableside — the cook presents mostly skin and little meat.","Serve with spring onion, cucumber strips, and sweet bean sauce, rolled in thin pancakes."],"titleDimSum":"点心","subtitleDimSum":"来自广东的匠心之作","contentDimSum":"<p>点心是中国各种小菜的统称，传统上在餐厅享用早午餐。大多数现代点心菜源于中国，通常与粤菜相关。</p><p>菜肴通常配茶一起食用，形成完整的茶点早午餐。点心菜通常以小蒸笼或小盘子供应的小口食物形式准备。</p>","recipeIngredientDimSum":"200g rice flour, 100g wheat starch, 200g ground pork, 100g shrimp, 1 tbsp sesame oil, 1 tsp soy sauce, assorted vegetables, bamboo steamer baskets","recipeInstructionsDimSum":["Make the dough: mix rice flour and wheat starch with hot water, knead until smooth.","Prepare fillings: combine ground pork, shrimp, sesame oil, and soy sauce with finely chopped vegetables.","Roll dough into small thin circles, place a spoonful of filling in the center.","Fold and pinch the edges to seal, then steam in bamboo baskets for 8–10 minutes.","Serve hot with Chinese tea as part of a dim sum brunch."],"titleHotpot":"火锅","subtitleHotpot":"最佳社交餐饮","contentHotpot":"<p>火锅，又称火锅，是一种源自中国的烹饪方法，在餐桌上提供一个正在沸腾的汤锅，里面有各种东亚食材和配料。</p><p>典型配料包括薄肉片、叶菜、蘑菇、馄饨、蛋饺子、豆腐和海鲜。熟食通常配蘸酱一起食用。</p>","recipeIngredientHotpot":"300g thinly sliced lamb or beef, 200g leaf vegetables, 100g mushrooms, 8 won tons, 150g tofu, 100g seafood, 1L hot soup stock, dipping sauce","recipeInstructionsHotpot":["Bring soup stock to a simmer at the dining table in a hot pot vessel.","Prepare ingredients: slice meat paper-thin, wash vegetables, slice tofu, clean seafood.","Add ingredients to the simmering broth using chopsticks or a ladle.","Cook until the meat and vegetables are done — timing varies by ingredient.","Dip cooked ingredients in your chosen dipping sauce and enjoy."],"titleDumplings":"饺子（Jiaozi）","subtitleDumplings":"传统与繁荣的味道","contentDumplings":"<p>饺子是中国饺子的一种，在中国和其他东亚地区普遍食用。它们是中国新年期间及北方各省全年食用的主要食物之一。</p><p>它们由肉馅和/或蔬菜馅包裹在薄擀的面团中，然后通过按压边缘密封而成。</p>","recipeIngredientDumplings":"250g ground pork or beef, 1 cup Napa cabbage (shredded and salt
