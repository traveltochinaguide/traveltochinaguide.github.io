          <p id="city-sub" data-lang-key="descLijiang" class="mt-2 text-sm sm:text-base text-white/90 max-w-2xl">纳西古都，联合国世界遗产，玉龙雪山映衬下的古城。</p>

      <div class="p-8">
        <div id="city-content" class="prose text-gray-700"><p>丽江位于云南西北部，曾是纳西王国首都，是中国保存最完好的古城之一。老城的运河系统和石桥营造出浪漫的水镇氛围，玉龙雪山提供壮观的背景。</p><p>印象丽江剧院的纳西文化表演不容错过，古老的木府让人们一窥纳西王室历史。</p></div>
      </div>

 window.translations = {"zh-CN":{"metaTitle":"探索中国 — 文化与风景","metaDescription":"浏览北京、上海等城市指南，桂林风光，长城一日游，美食与实用旅行贴士。","metaKeywords":"中国旅游, 中国旅行, 北京旅游, 上海指南, 长城, 故宫, 兵马俑, 桂林, 中国美食, 中国旅行规划","siteTitle":"探索中国","navHome":"首页","navCulture":"文化","cultureIching":"易经","navCities":"热门城市","navFood":"美食","navNature":"自然风光","carouselTitle1":"万里长城","carouselSubtitle1":"宏伟的古代世界奇迹。","carouselTitle2":"上海","carouselSubtitle2":"现代中国充满活力的脉搏。","carouselTitle3":"桂林","carouselSubtitle3":"喀斯特山脉与宁静河流的交汇。","citiesTitle":"标志性城市","citiesDescription":"从帝王之都到未来主义大都市，发现中国充满活力的心脏。","cityBeijing":"北京","descBeijing":"帝王之都，紫禁城和长城的所在地。","cityShanghai":"上海","descShanghai":"一个耀眼的大都市，展示了中国的未来雄心和殖民历史。","cityXian":"西安","descXian":"丝绸之路的古老起点，兵马俑的故乡。","cityGuilin":"桂林","descGuilin":"以漓江沿岸令人惊叹的喀斯特地貌而闻名。","longDescBeijing":"<p>Beijing, the capital of the People's Republic of China, is a city of immense history and cultural significance. It has been the center of power for much of the country's history, which is evident in its grand architecture.</p><p>Explore the vast complex of the Forbidden City, the former imperial palace, walk along the historic <strong>Great Wall</strong> (see the <a href=\"#great-wall-tour\">Great Wall Tour section</a> below), and visit the serene Temple of Heaven. Modern Beijing is also a hub of art, cuisine, and commerce, offering a dynamic blend of old and new.</p><h3 id=\"great-wall-tour\" class=\"text-xl font-semibold mt-6 mb-2\">Beijing Great Wall Tour – Mutianyu & Badaling</h3><p>The <strong>Beijing Great Wall tour</strong> is the most popular day trip from the city. Typical options include private transfers, shared shuttle buses, and guided excursions to <strong>Mutianyu</strong> (gentler slopes and restored sections) or <strong>Badaling</strong> (easier access and visitor facilities). Tours range from half-day to full-day and often include cable car or toboggan options.</p><p><strong>Duration:</strong> 4–6 hours depending on destination and transport. <strong>How to book:</strong> Book via local tour operators, reputable booking platforms, or your hotel concierge. For a quieter experience choose Mutianyu on weekdays; for the classic experience choose Badaling early in the morning.</p><figure class=\"mt-4\"> <img src=\"/images/attr-great-wall-detail.jpg\" alt=\"Beijing Great Wall tour – Mutianyu section\" width=\"1200\" height=\"675\" class=\"w-full h-auto rounded\" loading=\"lazy\"> <figcaption class=\"text-sm text-gray-500 mt-2\">Beijing Great Wall tour: Mutianyu section – recommended for families and photographers.</figcaption></figure><h3 id=\"798-art-zone\" class=\"text-xl font-semibold mt-6 mb-2\">798 Art Zone (Dashanzi)</h3><p>The <strong>798 Art Zone</strong>, or Dashanzi Art District, is a vibrant hub of contemporary Chinese art. Housed in decommissioned military factories built with a unique Bauhaus-influenced style, it's a maze of galleries, studios, boutiques, and cafés. It's a must-visit for modern art lovers, offering a look into Beijing's creative scene. Allow 3-4 hours to explore.</p><figure class=\"mt-4\"> <img src=\"/images/attr-798-art.jpg\" alt=\"798 Art Zone gallery\" width=\"1200\" height=\"675\" class=\"w-full h-auto rounded\" loading=\"lazy\"> <figcaption class=\"text-sm text-gray-500 mt-2\">A gallery in Beijing's 798 Art Zone.</figcaption></figure><h3 class=\"text-xl font-semibold mt-6 mb-2\">How to get there</h3><p><strong>By air:</strong> Beijing Capital (PEK) and Beijing Daxing (PKX) serve international flights. From airports use airport express train, taxis or Didi (ride-hailing).</p><p><strong>By train:</strong> Beijing has multiple stations (Beijing South, Beijing West, Beijing Railway Station) connecting high-speed services from throughout China.</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">Best time to visit</h3><p>Spring (Apr–May) and Autumn (Sep–Oct) offer comfortable weather and clearer skies. Winters can be very cold; summers are hot and humid.</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">Getting around</h3><ul><li><strong>Subway:</strong> Extensive, inexpensive and efficient. Get a transit card (Yikatong) or use mobile payments.</li><li><strong>Taxi / Didi:</strong> Widely available. Have your destination written in Chinese for drivers.</li><li><strong>Walking / cycling:</strong> Hutongs and some park areas are best explored on foot.</li></ul><h3 class=\"text-xl font-semibold mt-6 mb-2\">Suggested itineraries</h3><p><strong>1 day:</strong> Forbidden City – Tiananmen Square – Temple of Heaven – Hutong walk in the evening.</p><p><strong>3 days:</strong> Day 1: Forbidden City + Tiananmen + Wangfujing; Day 2: Great Wall (Mutianyu) day trip; Day 3: Summer Palace + Temple of Heaven + Hutongs.</p><h3 class=\"text-xl font-semibold mt-6 mb-2\">Practical tips</h3><ul><li>Cash & mobile pay: Alipay/WeChat Pay are widely used; many places accept cards in big hotels and attractions.</li><li>Visa: Check embassy rules before travel.</li><li>Air quality: Check AQI and plan outdoor activities when air is clearer.</li><li>Emergency: Dial <strong>110</strong> for police, <strong>120</strong> for ambulance, <strong>119</strong> for fire in China.</li><li>Language: English signage is common at major attractions but learn a few Chinese phrases or use translation apps.</li></ul>","cityJiuzhaigou":"九寨沟","descJiuzhaigou":"彩色湖泊、层叠瀑布与雪峰的奇境。","cityYangtze":"长江","descYangtze":"穿越壮丽三峡，畅游中华文明的命脉。","cityIching":"易经","longDescShanghai":"<p>上海是全球金融中心，也是一座充满卓越特质的城市。以上海中心大厦和东方明珠塔为主的未来主义天际线令人叹为观止。</p><p>沿着外滩漫步，欣赏殖民时期的建筑；探索法租界的时尚精品店和艺术画廊；或在古典的豫园中寻找宁静。上海是中国快速发展的见证，是每位游客的必访之地。</p>","longDescXian":"<p>西安是中国最古老的城市之一，也是丝绸之路的东端起点。最著名的景点是兵马俑，这是一个巨大的陶俑群，描绘了秦始皇——中国第一位皇帝的军队。</p><p>古城墙保存完好，您可以在城墙上骑自行车，欣赏壮观的景色。别错过回民街，那里是充满活力的美食体验。</p>","longDescGuilin":"<p>桂林的风景是中国古典山水画的灵感来源。位于华南，以沿漓江的奇特喀斯特地貌闻名于世。</p><p>体验其之美的最佳方式是沿漓江乘船游览，您将看到石灰岩山峰、竹林和宁静的村庄。您还可以探索芦笛岩，这是一个天然石灰岩洞穴，有色彩灯光照亮的壮观钟乳石和石笋。</p>","longDescZhangjiajie":"<p>Zhangjiajie is famous for its towering pillar-like sandstone formations set within a UNESCO-listed national park – an otherworldly landscape perfect for hiking and photography.</p><h3>Highlights</h3><ul><li><strong>Zhangjiajie National Forest Park</strong> – home to the famous quartz-sandstone pillars.</li><li><strong>Avatar Hallelujah Mountains</strong> – scenic viewpoints inspired cinematic landscapes.</li><li><strong>Glass Bridge (Zhangjiajie Grand Canyon)</strong> – a thrilling suspended walkway with dramatic views.</li></ul>","longDescJiuzhaigou":"<p>Jiuzhaigou is renowned for its vivid turquoise lakes, multi-tiered waterfalls and pristine alpine valleys – a scenic gem in Sichuan province.</p><h3>Highlights</h3><ul><li><strong>Rize Valley</strong> – colorful lakes and clear water reflections.</li><li><strong>Shuzheng Valley</strong> – classic views of layered waterfalls.</li><li><strong>Hiking & Photography</strong> – boardwalk trails provide easy access to viewpoints.</li></ul>","longDescYangtze":"<p>The Yangtze is China's longest river, famous for the dramatic Three Gorges and popular river cruises that combine scenery with cultural visits.</p><h3>Highlights</h3><ul><li><strong>Three Gorges</strong> – steep-sided gorges carved by the river offering spectacular views.</li><li><strong>Yangtze Cruises</strong> – multi-day cruise options between Chongqing and Yichang.</li><li><strong>Cultural stops</strong> – riverside towns, temples and local markets.</li></ul>","longDescIching":"<p>The <strong>易经</strong> (also written <em>iching</em>, Chinese: <strong>易经</strong>) – literally the <em>Book of Changes</em> – is one of the oldest Chinese classics. It combines cosmology, philosophy and a system of 64 hexagrams used historically for divination and decision-making.</p><h3>History & structure</h3><p>The iching developed over millennia. Each of its 64 hexagrams is formed from six lines (broken or unbroken). Traditional commentaries – the Ten Wings – expanded the text into a rich philosophical work used by scholars and sages.</p><h3>How iching divination works</h3><p>Modern iching methods use coins or yarrow stalk techniques to generate a hexagram. Interpreting the iching hexagram involves reading its meaning, line transformations, and how it relates to your question.</p><h3>Why read the I Ching today?</h3><ul><li><strong>Philosophical insight:</strong> iching offers frameworks for change and decision-making.</li><li><strong>Cultural context:</strong> Understanding 易经 deepens appreciation for Chinese thought, history and literature.</li><li><strong>Practical uses:</strong> meditation, creative prompts, and reflective decision processes.</li></ul><h3>Further reading & resources</h3><p>Recommended translations and commentaries include works by Richard Wilhelm (translated by Cary F. Baynes), and modern commentaries that explain iching hexagrams in contemporary terms.</p><h3>Learn more</h3><p>If you are visiting China and interested in cultural tours, ask local museums or cultural centers about lectures and exhibits related to I Ching and Chinese classical philosophy.</p>","longDescLijiang":"<p>丽江，云南省西北部的世界文化遗产之城。纳西古城的运河与石桥网络保存完好，已有800多年历史。玉龙雪山（5,596米）脚下的古城。</p><h3>亮点</h3><ul><li><strong>古城（世界文化遗产）</strong> — 迷宫般的巷道，小桥流水人家。</li><li><strong>玉龙雪山</strong> — 乘缆车至4506米观景台。</li><li><strong>蓝月谷</strong> — 雪山下的蓝色山谷。</li></ul><h3>实用信息</h3><p>初到高原注意适应海拔，避免剧烈运动。</p>","natureTitle":"震撼人心的自然风光","natureDescription":"发现数百年来为诗人和艺术家提供灵感的多元景观。","natureZhangjiajie":"张家界","descZhangjiajie":"以奇特的石英砂岩柱闻名，是《阿凡达》电影的灵感来源。","natureJiuzhaigou":"九寨沟","natureYangtze":"长江","cuisineTitle":"一场美食之旅","cuisineDescription":"品尝丰富多彩的中国美食，满足各种口味。","popularDishesTitle":"热门菜品","foodDuck":"北京烤鸭","foodDimSum":"点心","foodHotpot":"火锅","foodDumplings":"饺子","tipsTitle":"实用旅行贴士","tipVisaTitle":"签证与入境","tipVisaDesc":"中国已对包括欧洲和亚洲在内的许多国家实施短期旅游免签政策。然而，政策更新频繁。我们强烈建议您在出行前查看当地中国大使馆或领事馆的最新官方公告，以确认您是否符合免签资格。","tipPaymentTitle":"支付方式","tipPaymentDesc":"支付宝和微信支付等移动支付占主导地位。推荐安装使用。酒店和大型商店接受主要信用卡。","footerText":"© 2026 China Tour. All Rights Reserved.","footerDisclaimer":"本为展示网站。所有图片均来自 Unsplash，仅供说明目的。","contactTitle":"联系我们","contactDescription":"有疑问？我们很乐意收到您的来信。请发送消息，我们会尽快回复。","contactNameLabel":"姓名","contactEmailLabel":"邮箱","contactMessageLabel":"留言","contactButton":"发送消息","foodPageTitle":"地道中华美食","foodPageSubtitle":"一场穿越中国美食风味的味蕾之旅","foodPageDesc":"中国美食之旅。探索川菜、粤菜等各地区美食。","metaDescFood":"Discover authentic Chinese cuisine — from Peking Duck and Dim Sum to regional specialties. Plan your culinary adventure in China.","metaDescPekingDuck":"Peking Duck — crispy-skinned roasted duck sliced tableside, a legendary imperial dish from Beijing served with pancakes, scallion and sweet bean sauce.","metaDescDimSum":"Dim Sum — a traditional Cantonese brunch of small dishes including har gow, siu mai and char siu bao, served with tea in elegant steamer baskets.","metaDescHotpot":"Hotpot — a social dining experience where diners cook thinly sliced meats, vegetables and noodles in a simmering broth at the table, dipping each ingredient in flavorful sauces.","metaDescDumplings":"Jiaozi (Dumplings) — folded meat and vegetable parcels in thin dough wrappers, a cherished Chinese New Year tradition and year-round comfort food across northern China.","foodIntroTitle":"中国烹饪的艺术","foodIntroDesc":"中国菜是世界上最古老、最多样的菜系之一。","regionSichuan":"川菜","descSichuan":"以大胆的口味、大蒜和辣椒的辛辣著称。","regionCantonese":"粤菜","descCantonese":"以新鲜食材和少量香料著称。点心是亮点。","regionJiangsu":"苏菜","descJiangsu":"以柔软的质地和严格的时令食材选择著称。","regionShandong":"鲁菜","descShandong":"以丰富的海鲜和汤品著称。","dishKungPao":"宫保鸡丁","descKungPao":"香辣炒鸡配花生和蔬菜。","dishMapoTofu":"麻婆豆腐","descMapoTofu":"豆腐配香辣油酱和肉末。","dishSpringRolls":"春卷","descSpringRolls":"金黄酥脆的蔬菜或肉馅卷。","dishChowMein":"炒面","descChowMein":"配蔬菜和酱油的炒面。","dishWontons":"馄饨","descWontons":"鲜嫩的水饺，配以清澈鲜美的汤底。","titlePekingDuck":"北京烤鸭","subtitlePekingDuck":"北京传奇烤鸭","contentPekingDuck":"<p>北京烤鸭是来自北京的菜肴，可追溯至皇室时代。肉的特点是薄而脆的皮，正宗的版本在食客面前由厨师切片，通常主要提供皮和少量肉。</p><p>鸭子是专门为这道菜饲养的，在65天后宰杀并调味，然后在封闭或悬挂炉中烤制。肉通常与大葱、黄瓜和甜面酱一起食用，用薄饼卷着馅料一起吃。</p>","recipeIngredientPekingDuck":"1 whole duck (specially bred for Peking Duck), 2 stalks scallion, 1 cucumber, 3 tbsp sweet bean sauce, 8 thin pancakes","recipeInstructionsPekingDuck":["Prepare the duck: breed for 65 days, slaughter and season before roasting.","Roast the duck in a closed or hung oven until the skin is thin and crisp.","Slice the duck tableside — the cook presents mostly skin and little meat.","Serve with spring onion, cucumber strips, and sweet bean sauce, rolled in thin pancakes."],"titleDimSum":"点心","subtitleDimSum":"来自广东的匠心之作","contentDimSum":"<p>点心是中国各种小菜的统称，传统上在餐厅享用早午餐。大多数现代点心菜源于中国，通常与粤菜相关。</p><p>菜肴通常配茶一起食用，形成完整的茶点早午餐。点心菜通常以小蒸笼或小盘子供应的小口食物形式准备。</p>","recipeIngredientDimSum":"200g rice flour, 100g wheat starch, 200g ground pork, 100g shrimp, 1 tbsp sesame oil, 1 tsp soy sauce, assorted vegetables, bamboo steamer baskets","recipeInstructionsDimSum":["Make the dough: mix rice flour and wheat starch with hot water, knead until smooth.","Prepare fillings: combine ground pork, shrimp, sesame oil, and soy sauce with finely chopped vegetables.","Roll dough into small thin circles, place a spoonful of filling in the center.","Fold and pinch the edges to seal, then steam in bamboo baskets for 8–10 minutes.","Serve hot with Chinese tea as part of a dim sum brunch."],"titleHotpot":"火锅","subtitleHotpot":"最佳社交餐饮","contentHotpot":"<p>火锅，又称火锅，是一种源自中国的烹饪方法，在餐桌上提供一个正在沸腾的汤锅，里面有各种东亚食材和配料。</p><p>典型配料包括薄肉片、叶菜、蘑菇、馄饨、蛋饺子、豆腐和海鲜。熟食通常配蘸酱一起食用。</p>","recipeIngredientHotpot":"300g thinly sliced lamb or beef, 200g leaf vegetables, 100g mushrooms, 8 won tons, 150g tofu, 100g seafood, 1L hot soup stock, dipping sauce","recipeInstructionsHotpot":["Bring soup stock to a simmer at the dining table in a hot pot vessel.","Prepare ingredients: slice meat paper-thin, wash vegetables, slice tofu, clean seafood.","Add ingredients to the simmering broth using chopsticks or a ladle.","Cook until the meat and vegetables are done — timing varies by ingredient.","Dip cooked ingredients in your chosen dipping sauce and enjoy."],"titleDumplings":"饺子（Jiaozi）","subtitleDumplings":"传统与繁荣的味道","contentDumplings":"<p>饺子是中国饺子的一种，在中国和其他东亚地区普遍食用。它们是中国新年期间及北方各省全年食用的主要食物之一。</p><p>它们由肉馅和/或蔬菜馅包裹在薄擀的面团中，然后通过按压边缘密封而成。</p>","recipeIngredientDumplings":"250g ground pork or beef, 1 cup Napa cabbage (shredded and salted), 2 tbsp soy sauce, 1 tbsp sesame oil, 1 package dumpling wrappers, 1 egg white (sealing)","recipeInstructionsDumplings":["Make the filling: combine ground meat, drained cabbage, soy sauce, and sesame oil.","Place a spoonful of filling in the center of each dumpling wrapper.","Brush edges with egg white and fold the wrapper, pressing edges to seal.","Boil, steam, or pan-fry the dumplings until fully cooked.","Serve during Chinese New Year or year-round with dipping sauce of black vinegar and ginger."],"carouselTitle4":"西安","carouselSubtitle4":"古老丝路起点，兵马俑的故乡。","carouselAlt1":"中国长城 - 蜿蜒于山脊之上的雄伟古代防御工事","carouselAlt2":"上海夜景 - 现代摩天大楼在夜空中璀璨闪耀","carouselAlt3":"桂林山水 - 漓江上标志性的中国山水景观","carouselAlt4":"西安兵马俑 - 数千个古代武士雕塑","carouselPrev":"上一张","carouselNext":"下一张","closeModalBtn":"关闭","carouselDot1":"轮播第1张，共4张","carouselDot2":"轮播第2张，共4张","carouselDot3":"轮播第3张，共4张","carouselDot4":"轮播第4张，共4张","cityZhangjiajie":"张家界","metaDescVisa":"2026中国签证指南：查看是否符合免签条件，了解签证类型（L、M、F、Q2）、材料要求和申请流程。","metaKeywordsVisa":"中国签证，免签，签证要求，中国旅行，入境许可证，落地签，中国入境要求","visaAmericas":"美洲指定国家","visaApplyStep1Desc":"确定您需要的签证类型，并根据您的国籍和访问目的确认您的资格。","visaApplyStep1Title":"确认要求","visaApplyStep2Desc":"准备护照、申请表、照片、行程及任何必需的辅助材料。","visaApplyStep2Title":"准备材料","visaApplyStep3Desc":"亲自前往最近的中国大使馆或领事馆提交申请。部分地点需要预约。","visaApplyStep3Title":"提交申请","visaApplyStep4Desc":"标准处理时间为4个工作日。可付费申请加急或超级加急服务。","visaApplyStep4Title":"等待审批","visaApplyStep5Desc":"领取护照，确认签证信息（姓名、日期、入境次数）无误后再出行。","visaApplyStep5Title":"领取签证","visaApplyTitle":"申请流程","visaAsia":"亚洲指定国家","visaEurope":"欧洲国家（15天）","visaFreeCountriesDesc":"以下国家的公民可免签入境中国短期停留。停留期限和条件因国籍而异。","visaFreeCountriesTitle":"免签国家","visaHeroSubtitle":"Plan your trip with confidence — up-to-date visa policies and practical guidance","visaHeroTitle":"中国签证与入
